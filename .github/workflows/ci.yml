name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test

  integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run integration tests
        id: integration
        run: INTEGRATION=1 bun test test/integration.test.ts
      - name: Warn on integration failure
        if: steps.integration.outcome == 'failure'
        run: echo "::warning::Integration tests failed — crt.sh may be down or rate-limiting. Review the logs above."

  release:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          for target in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64 bun-windows-x64; do
            platform="${target#bun-}"
            ext=""; [[ "$platform" == "windows-x64" ]] && ext=".exe"
            bun build --compile --target=$target src/index.ts --outfile "crt-${platform}${ext}"
            bun build --compile --target=$target src/mcp.ts --outfile "crt-mcp-${platform}${ext}"
          done

      - name: Verify binaries
        run: |
          for f in crt-*; do
            size=$(stat -c%s "$f")
            echo "$f: $size bytes"
            [ "$size" -lt 1000 ] && echo "ERROR: $f too small" && exit 1
          done

      - name: Get version
        id: version
        run: echo "version=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            crt-linux-x64
            crt-linux-arm64
            crt-darwin-x64
            crt-darwin-arm64
            crt-windows-x64.exe
            crt-mcp-linux-x64
            crt-mcp-linux-arm64
            crt-mcp-darwin-x64
            crt-mcp-darwin-arm64
            crt-mcp-windows-x64.exe
